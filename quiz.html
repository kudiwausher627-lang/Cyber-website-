<!DOCTYPE html>
<html>
<head>
  <title>Quiz Center</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, red, green);
      color: white;
      padding-top: 50px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      width: 300px;
    }

    .top-btn {
      width: auto;
      padding: 10px 20px;
      font-size: 16px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="index.html">
  <button class="top-btn">⬅ Go Back to Cyber Security Site</button>
</a>

<h1>Quiz Center 🎯</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">Next Question</button>

<script>
const quiz = [
  {
    question: "What is Cyber Security?",
    answers: [
      { text: "Protecting systems from attacks", correct: true },
      { text: "Playing online games", correct: false }
    ]
  },

  {
    question: "What is cyber bullying?",
    answers: [
      { text: "Sending harmful messages online", correct: true },
      { text: "Helping friends online", correct: false }
    ]
  },

  {
    question: "How can you avoid hacking?",
    answers: [
      { text: "Use strong passwords and 2FA", correct: true },
      { text: "Share passwords with friends", correct: false }
    ]
  }
];

let current = 0;

function loadQuestion() {
  let q = quiz[current];

  document.getElementById("question").innerText = q.question;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  document.getElementById("result").innerText = "";

  q.answers.forEach(answer => {
    let btn = document.createElement("button");
    btn.innerText = answer.text;

    btn.onclick = function () {
      if (answer.correct) {
        document.getElementById("result").innerText = "Correct! 🎉";
      } else {
        document.getElementById("result").innerText = "Wrong ❌";
      }
    };

    answersDiv.appendChild(btn);
  });
}

function nextQuestion() {
  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.getElementById("question").innerText = "Quiz Finished 🎉";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("result").innerText = "Well done!";
  }
}

window.onload = loadQuestion;
</script>

</body>
</html>
